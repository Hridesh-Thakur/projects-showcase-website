  <style>
    :root {
      --bg: #f5f1e8;
      --paper: #fbf8f3;
      --paper-2: #efe7dc;
      --ink: #1f1c17;
      --muted: #6f675d;
      --line: rgba(31, 28, 23, 0.12);
      --accent: #145c52;
      --accent-soft: #d8e6df;
      --accent-2: #8a5a44;
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: Inter, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      background-image:
        radial-gradient(circle at top left, rgba(20,92,82,.06), transparent 28%),
        radial-gradient(circle at bottom right, rgba(138,90,68,.05), transparent 24%);
    }
    a { color: inherit; }
    .wrap { width: min(1120px, calc(100% - 32px)); margin: auto; }
    .card {
      background: color-mix(in srgb, var(--paper) 88%, white 12%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(58, 45, 35, 0.06);
    }
    header {
      padding: 52px 0 24px;
      margin-bottom: 10px;
      background: linear-gradient(180deg, #d9c6ad 0%, #ceb496 100%);
      border-bottom: 1px solid rgba(31, 28, 23, 0.12);
    }
    [data-theme="dark"] header {
      background: linear-gradient(180deg, #2e2620 0%, #241d18 100%);
      border-bottom: 1px solid rgba(242, 236, 227, 0.08);
    }
    .hero { display: grid; grid-template-columns: 1.4fr .8fr; gap: 18px; align-items: stretch; }
    .hero-main { padding: 34px; }
    .badge {
      display: inline-flex;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 18px;
    }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.4rem, 5vw, 4.5rem);
      line-height: .98;
      letter-spacing: -0.04em;
      max-width: 10ch;
      margin-bottom: 16px;
      font-weight: 700;
    }
    .grad { color: var(--accent); }
    .sub { color: var(--muted); max-width: 58ch; font-size: 1rem; }
    .toolbar { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
    .input, .btn, .chip, .linkbtn {
      font: inherit;
      border-radius: 999px;
      transition: .2s ease;
    }
    .input {
      flex: 1 1 280px;
      padding: 14px 18px;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
    }
    .input::placeholder { color: #8a8073; }
    .btn {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 168px;
      padding: 14px 18px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #f7f4ee;
      font-weight: 700;
    }
    .btn:hover, .primary:hover { background: #0f4d45; }
    .stats {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 18px;
      background: var(--paper-2);
    }
    .stat {
      background: rgba(255,255,255,.5);
      border: 1px solid rgba(31,28,23,.08);
      border-radius: 16px;
      padding: 18px;
      text-align: left;
    }
    .num {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 2rem;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 6px;
    }
    .label {
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    main { padding: 18px 0 70px; }
    .filters { display: flex; gap: 10px; flex-wrap: wrap; margin: 0 0 22px; }
    .chip {
      padding: 9px 14px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    .chip.active {
      background: var(--ink);
      color: #f8f4ec;
      border-color: var(--ink);
      font-weight: 600;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; }
    .repo { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .emoji { font-size: 22px; opacity: .82; }
    .title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.4rem;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .desc { color: var(--muted); font-size: .95rem; min-height: 48px; }
    .tech, .meta, .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .tech span, .meta span {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f1ebe2;
      color: #51493f;
      border: 1px solid rgba(31, 28, 23, 0.08);
    }
    .actions { margin-top: auto; padding-top: 4px; }
    .linkbtn {
      flex: 1;
      text-align: center;
      text-decoration: none;
      padding: 12px 14px;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
    }
    .primary {
      background: var(--accent);
      color: #f7f4ee;
      border-color: var(--accent);
      font-weight: 700;
    }
    .empty { padding: 30px; text-align: center; color: var(--muted); }
    @media (max-width: 820px) {
      .hero { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 560px) {
      .wrap { width: min(100% - 20px, 1120px); }
      .hero-main { padding: 24px; }
      .stats { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
    }

    [data-theme="dark"] {
      --bg: #171411;
      --paper: #211d19;
      --paper-2: #2a241f;
      --ink: #f2ece3;
      --muted: #b7ac9e;
      --line: rgba(242, 236, 227, 0.12);
      --accent: #7fc2b6;
      --accent-soft: rgba(127, 194, 182, 0.14);
      --accent-2: #c09178;
    }
    @media (prefers-color-scheme: dark) {

        --bg: #171411;
        --paper: #211d19;
        --paper-2: #2a241f;
        --ink: #f2ece3;

        --accent: #7fc2b6;
        --accent-soft: rgba(127, 194, 182, 0.14);
        --accent-2: #c09178;

    .theme-toggle {
      position: fixed;
      right: 18px;
      top: 18px;
      z-index: 50;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--paper) 84%, transparent 16%);
      color: var(--ink);
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
      cursor: pointer;
      font-size: 18px;
      backdrop-filter: blur(10px);
    }

        const s = q.toLowerCase();
        filtered = filtered.filter(p => [p.title,p.desc,p.category,...p.tech].join(' ').toLowerCase().includes(s));
      }
      grid.innerHTML = filtered.length ? filtered.map(card).join('') : '<div class="card empty">No matching repositories found.</div>';
    }

    function setCategory(c) { active = c; renderFilters(); render(); }
    searchInput.addEventListener('input', e => { q = e.target.value; render(); });
    renderFilters();
    render();
    window.setCategory = setCategory;
  
    const root = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    root.setAttribute('data-theme', theme);
    function syncToggle() {
      const dark = root.getAttribute('data-theme') === 'dark';
      toggle.textContent = dark ? '☀' : '☾';
      toggle.setAttribute('aria-pressed', String(dark));
      toggle.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
    }
    syncToggle();
    toggle.addEventListener('click', () => {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      syncToggle();
    });

  </script>
</body>
</html>
